<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>IOL Marking Capture</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f16;
      --panel: #151b24;
      --panel-2: #10151d;
      --border: #2a3140;
      --text: #edf2f7;
      --muted: #a6b0c0;
      --success: #58d38d;
      --warning: #f0b429;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      min-width: 0;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    }

    body {
      padding:
        max(8px, env(safe-area-inset-top))
        8px
        max(8px, env(safe-area-inset-bottom))
        8px;
    }

    .app {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 16px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      overflow: hidden;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      min-height: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #111827;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .muted {
      color: var(--muted);
      font-size: 11px;
    }

    .preview-card {
      padding: 8px;
      min-height: 0;
      display: grid;
    }

    .preview-shell {
      position: relative;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    video {
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    #overlayCanvas {
      z-index: 2;
      pointer-events: none;
    }

    .preview-head {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
      z-index: 3;
    }

    .pill {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      background: rgba(10, 12, 16, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 8px;
      min-height: 0;
    }

    .grid-4,
    .grid-5,
    .grid-6 {
      display: grid;
      gap: 6px;
    }

    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }

    label.field {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    input, select, button {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f141b;
      color: var(--text);
      padding: 0 10px;
      font-size: 13px;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 600;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #313847, #1c222d);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.25),
        0 1px 1px rgba(0,0,0,0.35),
        0 8px 18px rgba(0,0,0,0.12);
    }

    button:disabled,
    input:disabled,
    select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 18px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .success { border-color: rgba(88, 211, 141, 0.45); }
    .warning { border-color: rgba(240, 180, 41, 0.45); }
    .danger { border-color: rgba(255, 107, 107, 0.45); }

    .status {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
      min-height: 52px;
    }

    @media (max-width: 900px) {
      .grid-4,
      .grid-5,
      .grid-6 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card topbar">
      <div>
        <div class="badge">IOL Capture iPhone</div>
        <h1>Toric Marking Overlay</h1>
        <div class="muted">v1.20 • Temiz ekran • Alt bilgi kutuları kaldırıldı</div>
      </div>
    </section>

    <section class="card preview-card">
      <div class="preview-shell">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>

        <div class="preview-head">
          <div class="pill">📸 Foto</div>
          <div class="pill" id="streamPill">Hazır değil</div>
        </div>
      </div>
    </section>

    <section class="card controls">
      <div class="grid-4">
        <label class="field">
          İsim
          <input id="patientNameInput" type="text" placeholder="Örn: Ahmet Yılmaz" />
        </label>

        <label class="field">
          IOL Tipi
          <input id="iolTypeInput" type="text" placeholder="Örn: AcrySof Toric" />
        </label>

        <label class="field">
          Diyoptri
          <input id="diopterInput" type="text" placeholder="Örn: 22.5D" />
        </label>

        <label class="field">
          Hedef Açı
          <input id="targetAngleInput" type="number" min="0" max="359" step="1" value="90" />
        </label>
      </div>

      <div class="grid-6">
        <label class="field">
          Kamera
          <select id="videoDevice"></select>
        </label>

        <label class="field">
          Torch
          <button id="torchBtn" type="button" disabled>
            <span class="btn-icon" id="torchIcon">💡</span>
            <span id="torchLabel">Torch Aç</span>
          </button>
        </label>

        <button id="grantBtn" class="success" type="button">
          <span class="btn-icon">🔓</span>
          <span>İzin Ver ve Başlat</span>
        </button>

        <button id="captureBtn" class="success" type="button" disabled>
          <span class="btn-icon">📸</span>
          <span>Foto Çek ve İndir</span>
        </button>

        <button id="calibrateBtn" type="button" class="warning" disabled>
          <span class="btn-icon">📐</span>
          <span>0° Kalibre Et</span>
        </button>

        <button id="refreshBtn" type="button" disabled>
          <span class="btn-icon">🔄</span>
          <span>Yenile</span>
        </button>
      </div>

      <div class="status" id="status">Hazır. “İzin Ver ve Başlat” ile kamera ve sensör izni birlikte istenir.</div>
    </section>
  </main>

  <script>
    const videoEl = document.getElementById("video");
    const overlayCanvasEl = document.getElementById("overlayCanvas");
    const overlayCtx = overlayCanvasEl.getContext("2d");

    const patientNameInputEl = document.getElementById("patientNameInput");
    const iolTypeInputEl = document.getElementById("iolTypeInput");
    const diopterInputEl = document.getElementById("diopterInput");
    const targetAngleInputEl = document.getElementById("targetAngleInput");
    const videoDeviceEl = document.getElementById("videoDevice");

    const grantBtnEl = document.getElementById("grantBtn");
    const captureBtnEl = document.getElementById("captureBtn");
    const refreshBtnEl = document.getElementById("refreshBtn");
    const torchBtnEl = document.getElementById("torchBtn");
    const torchIconEl = document.getElementById("torchIcon");
    const torchLabelEl = document.getElementById("torchLabel");
    const calibrateBtnEl = document.getElementById("calibrateBtn");

    const statusEl = document.getElementById("status");
    const streamPillEl = document.getElementById("streamPill");

    let currentStream = null;
    let currentTrack = null;
    let permissionGranted = false;
    let torchSupported = false;
    let torchEnabled = false;

    let sensorPermissionGranted = false;
    let sensorListening = false;
    let currentRoll = 0;
    let zeroOffset = 0;
    let overlayAnimationId = null;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function clampAngle360(value) {
      let result = value % 360;
      if (result < 0) result += 360;
      return result;
    }

    function angleToCanvasRad(deg) {
      return (-deg * Math.PI) / 180;
    }

    function normalizeSigned180(value) {
      let result = clampAngle360(value);
      if (result > 180) result -= 360;
      return result;
    }

    function getTargetAngle() {
      const raw = Number(targetAngleInputEl.value);
      if (!Number.isFinite(raw)) return 90;
      return clampAngle360(Math.round(raw));
    }

    function createTimeStampFilePart(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}_${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
    }

    function formatDateTime(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    function sanitizePart(value, fallback = "x") {
      const v = String(value || "").trim();
      if (!v) return fallback;
      return v
        .replace(/[<>:"/\\|?*\u0000-\u001F]/g, "-")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^[_\-.]+|[_\-.]+$/g, "")
        .slice(0, 60) || fallback;
    }

    function normalizeAngleValue(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "";
      return String(clampAngle360(Math.round(num))).padStart(3, "0");
    }

    function getOutputBaseName() {
      const name = sanitizePart(patientNameInputEl.value, "hasta");
      const iol = sanitizePart(iolTypeInputEl.value, "IOL");
      const diopter = sanitizePart(diopterInputEl.value, "xD");
      const angle = normalizeAngleValue(targetAngleInputEl.value) || "090";
      return `${name}_${iol}_${diopter}_${angle}deg`;
    }

    function updateTorchUi() {
      if (!torchSupported) {
        torchLabelEl.textContent = "Torch Yok";
        torchIconEl.textContent = "🚫";
        torchBtnEl.disabled = true;
        return;
      }

      torchLabelEl.textContent = torchEnabled ? "Torch Kapat" : "Torch Aç";
      torchIconEl.textContent = torchEnabled ? "🔦" : "💡";
      torchBtnEl.disabled = !currentTrack;
    }

    function updateUiState() {
      const hasStream = Boolean(currentStream);
      captureBtnEl.disabled = !hasStream;
      refreshBtnEl.disabled = !permissionGranted;
      videoDeviceEl.disabled = !permissionGranted;
      grantBtnEl.disabled = permissionGranted && hasStream;
      calibrateBtnEl.disabled = !sensorPermissionGranted;
      streamPillEl.textContent = hasStream ? "Canlı" : "Kapalı";
      updateTorchUi();
    }

    function cleanupStream() {
      if (!currentStream) return;
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
      currentTrack = null;
      torchSupported = false;
      torchEnabled = false;
      videoEl.pause();
      videoEl.srcObject = null;
      streamPillEl.textContent = "Kapalı";
    }

    function getSelectedDeviceLabel() {
      return videoDeviceEl.options[videoDeviceEl.selectedIndex]?.textContent ?? "-";
    }

    async function directDownloadFile(file) {
      const url = URL.createObjectURL(file);
      const a = document.createElement("a");
      a.href = url;
      a.download = file.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    async function requestCameraPermission() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("Tarayıcı kamera erişimini desteklemiyor.");
      }

      const tempStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });

      tempStream.getTracks().forEach(track => track.stop());
      permissionGranted = true;
    }

    async function requestSensorPermissionFromGesture() {
      if (sensorPermissionGranted) return;

      if (typeof DeviceOrientationEvent === "undefined") {
        throw new Error("Bu cihazda orientation sensörü erişimi yok.");
      }

      if (typeof DeviceOrientationEvent.requestPermission === "function") {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          throw new Error("Sensör izni verilmedi.");
        }
      }

      if (!sensorListening) {
        window.addEventListener("deviceorientation", handleOrientation, true);
        sensorListening = true;
      }

      sensorPermissionGranted = true;
    }

    async function populateDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoInputs = devices.filter(device => device.kind === "videoinput");
      const previous = videoDeviceEl.value;

      videoDeviceEl.innerHTML = "";

      if (!videoInputs.length) {
        throw new Error("Kamera bulunamadı.");
      }

      for (const device of videoInputs) {
        const option = document.createElement("option");
        option.value = device.deviceId;
        option.textContent = device.label?.trim() || `Kamera ${videoDeviceEl.options.length + 1}`;
        videoDeviceEl.appendChild(option);
      }

      const preferredIndex =
        videoInputs.findIndex(item => /triple|arka|back|rear/i.test(item.label || "")) >= 0
          ? videoInputs.findIndex(item => /triple|arka|back|rear/i.test(item.label || ""))
          : videoInputs.findIndex(item => /wide|weit|ultra/i.test(item.label || ""));

      const previousIndex = videoInputs.findIndex(item => item.deviceId === previous);
      videoDeviceEl.selectedIndex = previousIndex >= 0 ? previousIndex : preferredIndex >= 0 ? preferredIndex : 0;
    }

    function waitForVideoReady(video) {
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error("Video hazır olmadı.")), 5000);
        video.addEventListener("loadedmetadata", () => {
          clearTimeout(timeout);
          resolve();
        }, { once: true });
      });
    }

    async function detectTorchSupport(track) {
      torchSupported = false;
      torchEnabled = false;

      if (!track?.getCapabilities) {
        updateTorchUi();
        return;
      }

      const caps = track.getCapabilities();
      torchSupported = Boolean(caps?.torch);
      updateTorchUi();
    }

    async function startSelectedCamera() {
      const deviceId = videoDeviceEl.value;
      if (!deviceId) throw new Error("Önce kamera seç.");

      cleanupStream();

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          deviceId: { exact: deviceId },
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 30 }
        }
      });

      currentStream = stream;
      currentTrack = stream.getVideoTracks()[0];
      videoEl.srcObject = stream;

      currentTrack.addEventListener("ended", () => {
        cleanupStream();
        updateUiState();
        setStatus("Kamera akışı sona erdi.");
      });

      await waitForVideoReady(videoEl);
      await videoEl.play();
      await detectTorchSupport(currentTrack);

      setStatus(`Canlı görüntü başladı.\nKamera: ${getSelectedDeviceLabel()}`);
      updateUiState();
      resizeOverlayCanvas();
      drawOverlay();
    }

    async function toggleTorch() {
      if (!currentTrack || !torchSupported) return;

      const nextState = !torchEnabled;
      await currentTrack.applyConstraints({
        advanced: [{ torch: nextState }]
      });

      torchEnabled = nextState;
      updateTorchUi();
      setStatus(torchEnabled ? "Torch açıldı." : "Torch kapatıldı.");
    }

    function getScreenAngle() {
      if (screen.orientation && typeof screen.orientation.angle === "number") {
        return screen.orientation.angle;
      }
      if (typeof window.orientation === "number") {
        return window.orientation;
      }
      return 0;
    }

    function computeRollFromOrientation(event) {
      const beta = Number.isFinite(event.beta) ? event.beta : 0;
      const gamma = Number.isFinite(event.gamma) ? event.gamma : 0;
      const angle = getScreenAngle();

      let roll;
      switch (angle) {
        case 90:
          roll = beta;
          break;
        case -90:
        case 270:
          roll = -beta;
          break;
        case 180:
          roll = -gamma;
          break;
        default:
          roll = gamma;
          break;
      }

      if (!Number.isFinite(roll)) return 0;
      return Math.max(-180, Math.min(180, roll));
    }

    function handleOrientation(event) {
      currentRoll = computeRollFromOrientation(event);
    }

    function getCalibratedRoll() {
      return normalizeSigned180(currentRoll - zeroOffset);
    }

    function calibrateZero() {
      zeroOffset = currentRoll;
      drawOverlay();
      setStatus("0° kalibrasyon yapıldı.");
    }

    function resizeOverlayCanvas() {
      const rect = overlayCanvasEl.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(rect.width * ratio));
      const height = Math.max(1, Math.round(rect.height * ratio));

      if (overlayCanvasEl.width !== width || overlayCanvasEl.height !== height) {
        overlayCanvasEl.width = width;
        overlayCanvasEl.height = height;
      }
    }

    function drawText(ctx, text, x, y, options = {}) {
      const {
        font = "600 14px -apple-system, BlinkMacSystemFont, Segoe UI, Arial",
        fillStyle = "rgba(255,255,255,0.92)",
        align = "center",
        baseline = "middle",
        shadow = true
      } = options;

      ctx.save();
      ctx.font = font;
      ctx.fillStyle = fillStyle;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      if (shadow) {
        ctx.shadowColor = "rgba(0,0,0,0.75)";
        ctx.shadowBlur = 8;
      }
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawMetadataOnContext(ctx, width, height) {
      const target = getTargetAngle();
      const now = Date.now();

      const lines = [
        `İsim: ${patientNameInputEl.value.trim() || "-"}`,
        `IOL: ${iolTypeInputEl.value.trim() || "-"}`,
        `Diyoptri: ${diopterInputEl.value.trim() || "-"}`,
        `Hedef: ${String(target).padStart(3, "0")}°`,
        `Kamera: ${getSelectedDeviceLabel()}`,
        `Tarih: ${formatDateTime(now)}`
      ];

      const padding = Math.round(width * 0.022);
      const boxWidth = Math.round(width * 0.50);
      const lineHeight = Math.max(24, Math.round(height * 0.033));
      const boxHeight = padding * 2 + lines.length * lineHeight;

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.40)";
      ctx.fillRect(padding, height - boxHeight - padding, boxWidth, boxHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.20)";
      ctx.lineWidth = 2;
      ctx.strokeRect(padding, height - boxHeight - padding, boxWidth, boxHeight);

      lines.forEach((line, index) => {
        drawText(
          ctx,
          line,
          padding + 16,
          height - boxHeight - padding + padding + index * lineHeight + lineHeight / 2,
          {
            font: `700 ${Math.max(18, Math.round(height * 0.021))}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
            fillStyle: "rgba(255,255,255,0.96)",
            align: "left",
            baseline: "middle"
          }
        );
      });

      ctx.restore();
    }

    function drawOverlayOnContext(ctx, width, height, rollDeg, targetDeg) {
      if (!ctx) return;

      ctx.clearRect(0, 0, width, height);

      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) * 0.39;
      const ringRadius = radius;
      const halfLineWidth = radius * 1.26;

      ctx.save();
      ctx.translate(cx, cy);

      ctx.beginPath();
      ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(3, ringRadius * 0.013);
      ctx.strokeStyle = "rgba(255,255,255,0.50)";
      ctx.stroke();

      for (let deg = 0; deg < 360; deg += 5) {
        const rad = angleToCanvasRad(deg);
        const isMajor = deg % 30 === 0;
        const isMid = deg % 10 === 0;
        const tickOuter = ringRadius;
        const tickInner = ringRadius - (isMajor ? ringRadius * 0.11 : isMid ? ringRadius * 0.075 : ringRadius * 0.04);

        ctx.beginPath();
        ctx.moveTo(Math.cos(rad) * tickInner, Math.sin(rad) * tickInner);
        ctx.lineTo(Math.cos(rad) * tickOuter, Math.sin(rad) * tickOuter);
        ctx.lineWidth = isMajor ? 3.4 : isMid ? 2.1 : 1.2;
        ctx.strokeStyle = isMajor ? "rgba(255,255,255,0.98)" : "rgba(255,255,255,0.42)";
        ctx.stroke();

        if (isMajor) {
          const labelRadius = ringRadius - ringRadius * 0.17;
          drawText(ctx, String(deg), Math.cos(rad) * labelRadius, Math.sin(rad) * labelRadius, {
            font: `800 ${Math.max(14, ringRadius * 0.09)}px -apple-system, BlinkMacSystemFont, Segoe UI, Arial`,
            fillStyle: "rgba(255,255,255,0.98)"
          });
        }
      }

      const targetRad = angleToCanvasRad(targetDeg);
      const oppositeRad = angleToCanvasRad(clampAngle360(targetDeg + 180));

      ctx.beginPath();
      ctx.moveTo(Math.cos(targetRad) * ringRadius * 0.98, Math.sin(targetRad) * ringRadius * 0.98);
      ctx.lineTo(Math.cos(oppositeRad) * ringRadius * 0.98, Math.sin(oppositeRad) * ringRadius * 0.98);
      ctx.lineWidth = Math.max(5, ringRadius * 0.021);
      ctx.strokeStyle = "rgba(77,163,255,0.98)";
      ctx.stroke();

      ctx.save();
      ctx.rotate((rollDeg * Math.PI) / 180);

      ctx.beginPath();
      ctx.moveTo(-halfLineWidth, 0);
      ctx.lineTo(halfLineWidth, 0);
      ctx.lineWidth = Math.max(6, ringRadius * 0.024);
      ctx.strokeStyle = "rgba(240,180,41,0.98)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-ringRadius * 0.18, 0);
      ctx.lineTo(ringRadius * 0.18, 0);
      ctx.lineWidth = Math.max(10, ringRadius * 0.04);
      ctx.strokeStyle = "rgba(88,211,141,0.98)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, -ringRadius * 0.28);
      ctx.lineTo(0, ringRadius * 0.28);
      ctx.lineWidth = Math.max(4, ringRadius * 0.018);
      ctx.strokeStyle = "rgba(255,255,255,0.96)";
      ctx.stroke();

      ctx.restore();

      ctx.beginPath();
      ctx.arc(0, 0, Math.max(6, ringRadius * 0.03), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.98)";
      ctx.fill();

      ctx.restore();

      drawText(ctx, `Hedef ${String(targetDeg).padStart(3, "0")}°`, width / 2, height * 0.12, {
        font: "800 26px -apple-system, BlinkMacSystemFont, Segoe UI, Arial",
        fillStyle: "rgba(77,163,255,0.98)"
      });
    }

    function drawOverlay() {
      resizeOverlayCanvas();
      drawOverlayOnContext(
        overlayCtx,
        overlayCanvasEl.width,
        overlayCanvasEl.height,
        getCalibratedRoll(),
        getTargetAngle()
      );
    }

    function startOverlayLoop() {
      if (overlayAnimationId !== null) {
        cancelAnimationFrame(overlayAnimationId);
      }

      const loop = () => {
        drawOverlay();
        overlayAnimationId = requestAnimationFrame(loop);
      };

      loop();
    }

    async function capturePhotoAndDownload() {
      if (!currentStream) throw new Error("Önce kamera açılmalı.");

      const width = videoEl.videoWidth;
      const height = videoEl.videoHeight;
      if (!width || !height) throw new Error("Video hazır değil.");

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvas alınamadı.");

      ctx.drawImage(videoEl, 0, 0, width, height);

      const overlayCanvas = document.createElement("canvas");
      overlayCanvas.width = width;
      overlayCanvas.height = height;
      const overlayCanvasCtx = overlayCanvas.getContext("2d");
      if (!overlayCanvasCtx) throw new Error("Overlay canvas alınamadı.");

      drawOverlayOnContext(
        overlayCanvasCtx,
        width,
        height,
        getCalibratedRoll(),
        getTargetAngle()
      );

      ctx.drawImage(overlayCanvas, 0, 0, width, height);
      drawMetadataOnContext(ctx, width, height);

      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(result => {
          if (!result) {
            reject(new Error("PNG üretilemedi."));
            return;
          }
          resolve(result);
        }, "image/png");
      });

      const fileName = `${getOutputBaseName()}_${createTimeStampFilePart(Date.now())}.png`;
      const file = new File([blob], fileName, { type: "image/png" });

      await directDownloadFile(file);
      setStatus(`Foto indirilmeye gönderildi.\nDosya: ${fileName}`);
    }

    grantBtnEl.addEventListener("click", async () => {
      try {
        await requestCameraPermission();
        try {
          await requestSensorPermissionFromGesture();
        } catch (sensorError) {
          setStatus(`Kamera izni verildi.\nSensör izni alınamadı: ${sensorError.message}`);
        }
        await populateDevices();
        await startSelectedCamera();
        updateUiState();
        if (sensorPermissionGranted) {
          setStatus("Kamera ve sensör hazır.");
        }
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    refreshBtnEl.addEventListener("click", async () => {
      try {
        await populateDevices();
        await startSelectedCamera();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    videoDeviceEl.addEventListener("change", async () => {
      try {
        await startSelectedCamera();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    captureBtnEl.addEventListener("click", async () => {
      try {
        await capturePhotoAndDownload();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    torchBtnEl.addEventListener("click", async () => {
      try {
        await toggleTorch();
      } catch (error) {
        setStatus(`Hata:\n${error instanceof Error ? error.message : String(error)}`);
      }
    });

    calibrateBtnEl.addEventListener("click", () => {
      calibrateZero();
    });

    targetAngleInputEl.addEventListener("input", () => {
      drawOverlay();
    });

    window.addEventListener("resize", () => {
      drawOverlay();
    });

    navigator.mediaDevices?.addEventListener?.("devicechange", async () => {
      if (!permissionGranted) return;
      try {
        await populateDevices();
        updateUiState();
      } catch (_) {}
    });

    window.addEventListener("beforeunload", () => {
      cleanupStream();
      if (sensorListening) {
        window.removeEventListener("deviceorientation", handleOrientation, true);
      }
      if (overlayAnimationId !== null) {
        cancelAnimationFrame(overlayAnimationId);
      }
    });

    updateUiState();
    drawOverlay();
    startOverlayLoop();
  </script>
</body>
</html>
